<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骐骐 · Qiqi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --ink: #2a2a2a;
    --muted: #8a8680;
    --line: #e5e1db;
    --accent: #b89d7d;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Cormorant Garamond", "Noto Serif SC", Georgia, serif;
    font-weight: 300; line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  header {
    min-height: 90vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 4rem 2rem;
  }
  header .name { font-size: clamp(4rem, 14vw, 9rem); font-weight: 300; letter-spacing: 0.02em; line-height: 1; }
  header .en { font-size: clamp(1rem, 2vw, 1.4rem); letter-spacing: 0.6em; text-transform: uppercase; color: var(--muted); margin-top: 1.5rem; padding-left: 0.6em; }
  header .dash { width: 1px; height: 60px; background: var(--line); margin: 3rem 0 1rem; }
  header .sub { font-size: 0.95rem; color: var(--muted); font-style: italic; }

  main { max-width: 820px; margin: 0 auto; padding: 4rem 2rem 8rem; }

  .state { text-align: center; padding: 4rem 1rem; color: var(--muted); font-style: italic; }
  .state .big { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--ink); font-style: normal; }

  .entry { margin-bottom: 7rem; opacity: 0; transform: translateY(20px); transition: opacity 1.2s ease, transform 1.2s ease; position: relative; }
  .entry.visible { opacity: 1; transform: translateY(0); }
  .entry .meta { display: flex; align-items: baseline; gap: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--line); }
  .entry .age-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .entry .age { font-size: 1.8rem; font-weight: 400; letter-spacing: 0.02em; line-height: 1.1; }
  .entry .age-sub { font-size: 0.9rem; color: var(--muted); font-style: italic; letter-spacing: 0.05em; }
  .entry .date { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-left: auto; align-self: flex-end; }
  .entry .photo { width: 100%; background: #efece7; overflow: hidden; margin-bottom: 1.5rem; }
  .entry .photo img, .entry .photo video { width: 100%; height: auto; display: block; transition: transform 1.5s ease; }
  .entry .photo:hover img { transform: scale(1.02); }
  .entry .photo video { background: #1a1a1a; }
  .entry .caption { font-size: 1.05rem; color: #4a4844; font-style: italic; max-width: 90%; }

  .entry .actions-row {
    display: flex; justify-content: flex-end; gap: 1.5rem;
    margin-top: 1rem; opacity: 0; transition: opacity 0.3s ease;
  }
  .entry:hover .actions-row { opacity: 0.6; }
  .entry .actions-row:hover { opacity: 1; }
  .entry .actions-row button {
    background: none; border: none; color: var(--muted);
    font-size: 0.75rem; letter-spacing: 0.15em;
    cursor: pointer; padding: 0.2rem 0; font-family: inherit;
    transition: color 0.2s;
  }
  .entry .actions-row .edit:hover { color: var(--accent); }
  .entry .actions-row .del:hover { color: #c06060; }
  body:not(.admin) .actions-row { display: none; }

  footer { text-align: center; padding: 3rem 2rem 6rem; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase; }
  footer .heart { color: var(--accent); font-style: normal; }
  footer .signout { margin-top: 1.2rem; display: none; }
  body.admin footer .signout { display: inline-block; }
  footer .signout button { background: none; border: none; color: var(--muted); font-family: inherit; letter-spacing: 0.15em; font-size: 0.75rem; cursor: pointer; border-bottom: 1px solid transparent; padding: 0.2rem 0; }
  footer .signout button:hover { color: var(--ink); border-bottom-color: var(--accent); }

  .fab {
    position: fixed; right: 2rem; bottom: 2rem; width: 56px; height: 56px;
    border-radius: 50%; background: var(--ink); color: var(--bg); border: none;
    font-size: 1.8rem; font-weight: 200; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 10;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .fab:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

  .music-toggle {
    position: fixed; left: 2rem; bottom: 2rem;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(250, 248, 245, 0.85);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1px solid var(--line); color: var(--muted);
    cursor: pointer; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-family: inherit;
    transition: color 0.25s, border-color 0.25s, transform 0.25s;
  }
  .music-toggle:hover { color: var(--ink); transform: translateY(-1px); }
  .music-toggle.playing { color: var(--accent); border-color: var(--accent); }
  .music-toggle.playing::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 1px solid var(--accent); opacity: 0.4;
    animation: ring 2.2s ease-out infinite;
  }
  @keyframes ring {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.35); opacity: 0; }
  }
  @media (max-width: 600px) {
    .music-toggle { left: 1.2rem; bottom: 1.2rem; width: 40px; height: 40px; }
  }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(30, 28, 25, 0.45);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 1.5rem;
  }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); width: 100%; max-width: 460px; padding: 2.5rem 2rem; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-weight: 400; font-size: 1.6rem; margin-bottom: 0.4rem; }
  .modal .hint { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; font-style: italic; }
  .modal label { display: block; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; margin-top: 1.2rem; }
  .modal input[type="text"], .modal input[type="date"], .modal input[type="password"], .modal textarea {
    width: 100%; padding: 0.7rem 0; border: none; border-bottom: 1px solid var(--line);
    background: transparent; font-family: inherit; font-size: 1rem; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .modal input:focus, .modal textarea:focus { border-bottom-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }

  .file-drop { margin-top: 0.5rem; border: 1px dashed var(--line); padding: 1.2rem; text-align: center; cursor: pointer; color: var(--muted); font-size: 0.9rem; transition: border-color 0.2s, color 0.2s, background 0.2s; }
  .file-drop:hover { border-color: var(--accent); color: var(--ink); }
  .file-drop.has-file { color: var(--ink); border-style: solid; }
  .file-drop.drag-active { border-color: var(--accent); color: var(--ink); background: #f3ede4; border-style: solid; }
  .file-drop input[type="file"] { display: none; }

  .preview { margin-top: 0.8rem; display: none; }
  .preview img, .preview video { width: 100%; display: block; max-height: 240px; object-fit: cover; background: #1a1a1a; }

  .actions { margin-top: 2.2rem; display: flex; justify-content: flex-end; gap: 1rem; }
  .actions button { background: none; border: none; font-family: inherit; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.7rem 1.2rem; cursor: pointer; transition: all 0.2s; }
  .actions .cancel { color: var(--muted); }
  .actions .cancel:hover { color: var(--ink); }
  .actions .save { background: var(--ink); color: var(--bg); }
  .actions .save:hover { background: var(--accent); }
  .actions .save:disabled { opacity: 0.4; cursor: not-allowed; }

  .err { color: #c06060; font-size: 0.85rem; margin-top: 0.8rem; min-height: 1.2em; }

  @media (max-width: 600px) {
    main { padding: 3rem 1.5rem 6rem; }
    .entry { margin-bottom: 5rem; }
    .entry .meta { flex-wrap: wrap; gap: 0.5rem; }
    .entry .date { margin-left: 0; width: 100%; }
    .fab { right: 1.2rem; bottom: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="name">骐骐</h1>
  <div class="en">Qiqi</div>
  <div class="dash"></div>
  <div class="sub">a little timeline</div>
</header>

<main id="timeline">
  <div class="state"><div class="big">加载中...</div></div>
</main>

<footer>
  made with <span class="heart">♡</span> for qiqi
  <div class="signout"><button id="btn-signout">退出上传模式</button></div>
</footer>

<button class="music-toggle" id="btn-music" title="播放背景音乐" aria-label="播放背景音乐">♪</button>
<audio id="music" src="lullaby.mp3" loop preload="none"></audio>

<button class="fab" id="btn-add" title="添加照片">+</button>

<div class="modal-bg" id="pwd-modal">
  <div class="modal">
    <h2>请先输入密码</h2>
    <div class="hint">只有知道密码的人才能上传或删除。</div>
    <label for="f-pwd">密码</label>
    <input type="password" id="f-pwd" autofocus>
    <div class="err" id="pwd-err"></div>
    <div class="actions">
      <button class="cancel" id="pwd-cancel">取消</button>
      <button class="save" id="pwd-ok">确认</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h2>编辑</h2>
    <div class="hint">改完点保存,照片不会变。</div>

    <label for="e-date">日期</label>
    <input type="date" id="e-date">

    <label for="e-age">标签(可选)</label>
    <input type="text" id="e-age" placeholder="如:满月、百天、周岁...">

    <label for="e-caption">一句话(可选)</label>
    <textarea id="e-caption"></textarea>

    <div class="err" id="e-err"></div>
    <div class="actions">
      <button class="cancel" id="e-cancel">取消</button>
      <button class="save" id="e-save">保存</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>添加一段记忆</h2>
    <div class="hint">上传照片,填上时间,就会加入时间线。</div>

    <label for="f-photo">照片或视频</label>
    <label for="f-photo" class="file-drop" id="file-drop">
      <input type="file" id="f-photo" accept="image/*,video/*">
      <span id="file-label">点击选择,或拖拽文件到这里</span>
    </label>
    <div class="preview" id="preview">
      <img id="preview-img" alt="" style="display:none">
      <video id="preview-video" controls playsinline style="display:none"></video>
    </div>

    <label for="f-date">日期</label>
    <input type="date" id="f-date">

    <label for="f-age">标签(可选)</label>
    <input type="text" id="f-age" placeholder="如:满月、百天、周岁...">

    <label for="f-caption">一句话(可选)</label>
    <textarea id="f-caption" placeholder="记下那一刻的感受"></textarea>

    <div class="err" id="up-err"></div>
    <div class="actions">
      <button class="cancel" id="btn-cancel">取消</button>
      <button class="save" id="btn-save" disabled>保存</button>
    </div>
  </div>
</div>

<script>
  // ---------- config ----------
  // 部署 Cloudflare Worker 后,把这里改成 Worker 的 URL。
  // 例如:https://qiqi-api.wkwunju.workers.dev
  const API_URL = 'https://qiqi-api.qiqi-baby.workers.dev';
  const BIRTH_DATE = '2026-03-21'; // 骐骐的生日

  // ---------- password (session) ----------
  const PWD_KEY = 'qiqi-pwd';
  const getPwd = () => sessionStorage.getItem(PWD_KEY) || '';
  const setPwd = (p) => sessionStorage.setItem(PWD_KEY, p);
  const clearPwd = () => sessionStorage.removeItem(PWD_KEY);
  const updateAdminUI = () => document.body.classList.toggle('admin', !!getPwd());
  updateAdminUI();

  // ---------- helpers ----------
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));

  const formatDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y} · ${m} · ${day}`;
  };

  const ageFromBirth = (dateIso) => {
    if (!BIRTH_DATE || !dateIso) return null;
    const birth = new Date(BIRTH_DATE + 'T00:00:00');
    const d = new Date(dateIso + 'T00:00:00');
    if (d < birth) return null;
    const totalDays = Math.round((d - birth) / 86400000);

    let years = d.getFullYear() - birth.getFullYear();
    let months = d.getMonth() - birth.getMonth();
    let days = d.getDate() - birth.getDate();
    if (days < 0) {
      months--;
      const prev = new Date(d.getFullYear(), d.getMonth(), 0);
      days += prev.getDate();
    }
    if (months < 0) { years--; months += 12; }
    return { years, months, days, totalDays };
  };

  const formatAge = (a) => {
    if (!a) return '';
    if (a.totalDays === 0) return '出生那天';
    if (a.years > 0) {
      const parts = [`${a.years} 岁`];
      if (a.months) parts.push(`${a.months} 个月`);
      if (a.days) parts.push(`${a.days} 天`);
      return parts.join(' ');
    }
    if (a.months > 0) {
      return a.days ? `${a.months} 个月 ${a.days} 天` : `${a.months} 个月`;
    }
    return `${a.totalDays} 天`;
  };

  const photoUrl = (name) => `${API_URL}/photos/${encodeURIComponent(name)}`;
  const isVideoEntry = (e) => e.type === 'video' || /\.(mp4|mov|webm|m4v|ogg|ogv)$/i.test(e.photo || '');

  // ---------- rendering ----------
  const timeline = document.getElementById('timeline');

  const render = async () => {
    try {
      const res = await fetch(`${API_URL}/manifest`, { cache: 'no-cache' });
      if (!res.ok) throw new Error('无法加载时间线');
      const entries = (await res.json()).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

      if (entries.length === 0) {
        timeline.innerHTML = `
          <div class="state">
            <div class="big">时间线还是空的</div>
            <div>点右下角的 + 添加第一张照片吧</div>
          </div>`;
        return;
      }

      timeline.innerHTML = '';
      entries.forEach(e => {
        const ageText = formatAge(ageFromBirth(e.date));
        const headline = e.age || ageText || '&nbsp;';
        const subline = e.age && ageText ? ageText : '';

        const el = document.createElement('article');
        el.className = 'entry';
        el.innerHTML = `
          <div class="meta">
            <div class="age-group">
              <div class="age">${e.age ? escapeHtml(headline) : headline}</div>
              ${subline ? `<div class="age-sub">${escapeHtml(subline)}</div>` : ''}
            </div>
            <div class="date">${formatDate(e.date)}</div>
          </div>
          <div class="photo">${isVideoEntry(e)
            ? `<video src="${escapeHtml(photoUrl(e.photo))}" controls playsinline preload="metadata"></video>`
            : `<img src="${escapeHtml(photoUrl(e.photo))}" alt="" loading="lazy">`}</div>
          ${e.caption ? `<p class="caption">${escapeHtml(e.caption)}</p>` : ''}
          <div class="actions-row">
            <button class="edit" data-id="${escapeHtml(e.id)}">编辑</button>
            <button class="del" data-id="${escapeHtml(e.id)}">删除</button>
          </div>
        `;
        el._entry = e;
        timeline.appendChild(el);
      });

      const io = new IntersectionObserver((items) => {
        items.forEach(i => { if (i.isIntersecting) { i.target.classList.add('visible'); io.unobserve(i.target); } });
      }, { threshold: 0.15 });
      document.querySelectorAll('.entry').forEach(e => io.observe(e));

      document.querySelectorAll('.edit').forEach(btn => {
        btn.addEventListener('click', () => {
          const entry = btn.closest('.entry')._entry;
          openEditModal(entry);
        });
      });

      document.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('删除这条记录?')) return;
          const id = btn.dataset.id;
          const res = await fetch(`${API_URL}/delete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-password': getPwd() },
            body: JSON.stringify({ id }),
          });
          if (res.status === 401) { clearPwd(); updateAdminUI(); alert('密码无效,请重新输入'); return; }
          if (!res.ok) { alert('删除失败'); return; }
          render();
        });
      });
    } catch (err) {
      timeline.innerHTML = `<div class="state"><div class="big">加载失败</div><div>${escapeHtml(err.message)}</div></div>`;
    }
  };

  // ---------- password modal ----------
  const pwdModal = document.getElementById('pwd-modal');
  const pwdInput = document.getElementById('f-pwd');
  const pwdErr = document.getElementById('pwd-err');

  const askPassword = () => new Promise((resolve) => {
    pwdInput.value = '';
    pwdErr.textContent = '';
    pwdModal.classList.add('open');
    pwdInput.focus();

    const ok = async () => {
      const val = pwdInput.value.trim();
      if (!val) { pwdErr.textContent = '请输入密码'; return; }
      const res = await fetch(`${API_URL}/verify`, {
        method: 'POST',
        headers: { 'x-password': val },
      });
      if (res.ok) {
        setPwd(val); updateAdminUI(); cleanup(); resolve(true);
      } else {
        pwdErr.textContent = '密码不对';
      }
    };
    const cancel = () => { cleanup(); resolve(false); };
    const cleanup = () => {
      pwdModal.classList.remove('open');
      document.getElementById('pwd-ok').removeEventListener('click', ok);
      document.getElementById('pwd-cancel').removeEventListener('click', cancel);
      pwdInput.removeEventListener('keydown', onKey);
    };
    const onKey = (e) => { if (e.key === 'Enter') ok(); if (e.key === 'Escape') cancel(); };
    document.getElementById('pwd-ok').addEventListener('click', ok);
    document.getElementById('pwd-cancel').addEventListener('click', cancel);
    pwdInput.addEventListener('keydown', onKey);
  });

  document.getElementById('btn-signout').addEventListener('click', () => {
    if (!confirm('退出上传模式?')) return;
    clearPwd(); updateAdminUI();
  });

  // ---------- edit modal ----------
  const editModal = document.getElementById('edit-modal');
  const eDate = document.getElementById('e-date');
  const eAge = document.getElementById('e-age');
  const eCaption = document.getElementById('e-caption');
  const eErr = document.getElementById('e-err');
  const eSave = document.getElementById('e-save');
  let editingId = null;

  const openEditModal = (entry) => {
    editingId = entry.id;
    eDate.value = entry.date || '';
    eAge.value = entry.age || '';
    eCaption.value = entry.caption || '';
    eErr.textContent = '';
    eSave.disabled = false;
    eSave.textContent = '保存';
    editModal.classList.add('open');
  };
  const closeEditModal = () => {
    editModal.classList.remove('open');
    editingId = null;
  };
  document.getElementById('e-cancel').addEventListener('click', closeEditModal);
  editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });

  eSave.addEventListener('click', async () => {
    if (!editingId) return;
    eSave.disabled = true;
    eSave.textContent = '保存中...';
    eErr.textContent = '';
    try {
      const res = await fetch(`${API_URL}/edit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-password': getPwd() },
        body: JSON.stringify({
          id: editingId,
          date: eDate.value,
          age: eAge.value.trim(),
          caption: eCaption.value.trim(),
        }),
      });
      if (res.status === 401) { clearPwd(); updateAdminUI(); eErr.textContent = '密码失效,请重新登录'; eSave.disabled = false; eSave.textContent = '保存'; return; }
      if (!res.ok) throw new Error(await res.text() || '保存失败');
      closeEditModal();
      render();
    } catch (err) {
      eErr.textContent = err.message;
      eSave.disabled = false;
      eSave.textContent = '保存';
    }
  });

  // ---------- upload modal ----------
  const modal = document.getElementById('modal');
  const fPhoto = document.getElementById('f-photo');
  const fDate = document.getElementById('f-date');
  const fAge = document.getElementById('f-age');
  const fCaption = document.getElementById('f-caption');
  const fileLabel = document.getElementById('file-label');
  const fileDrop = document.getElementById('file-drop');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('preview-img');
  const previewVideo = document.getElementById('preview-video');
  const btnSave = document.getElementById('btn-save');
  const upErr = document.getElementById('up-err');

  let currentPhotoBlob = null;
  let currentIsVideo = false;

  const openUploadModal = () => {
    modal.classList.add('open');
    fDate.value = new Date().toISOString().slice(0, 10);
  };
  const closeUploadModal = () => {
    modal.classList.remove('open');
    fPhoto.value = ''; fDate.value = ''; fAge.value = ''; fCaption.value = '';
    fileLabel.textContent = '点击选择,或拖拽文件到这里';
    fileDrop.classList.remove('has-file');
    fileDrop.classList.remove('drag-active');
    preview.style.display = 'none';
    previewImg.style.display = 'none';
    previewImg.src = '';
    previewVideo.style.display = 'none';
    if (previewVideo.src) URL.revokeObjectURL(previewVideo.src);
    previewVideo.removeAttribute('src');
    previewVideo.load();
    currentPhotoBlob = null;
    upErr.textContent = '';
    btnSave.disabled = true;
    btnSave.textContent = '保存';
  };

  document.getElementById('btn-add').addEventListener('click', async () => {
    if (!getPwd()) {
      const ok = await askPassword();
      if (!ok) return;
    }
    openUploadModal();
  });
  document.getElementById('btn-cancel').addEventListener('click', closeUploadModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeUploadModal(); });

  // ---------- resize ----------
  const resizeImage = (file, maxW = 1600, quality = 0.85) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('压缩失败')), 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const handleFile = async (file) => {
    if (!file) return;
    const isImage = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');
    if (!isImage && !isVideo) {
      upErr.textContent = '请选择图片或视频文件';
      return;
    }
    if (isVideo && file.size > 90 * 1024 * 1024) {
      upErr.textContent = `视频过大(${(file.size / 1024 / 1024).toFixed(1)}MB),上限 90MB。请先剪短或降低分辨率。`;
      return;
    }
    upErr.textContent = '';
    fileLabel.textContent = '处理中...';
    try {
      let blob;
      if (isImage) {
        blob = await resizeImage(file);
        previewImg.src = URL.createObjectURL(blob);
        previewImg.style.display = 'block';
        previewVideo.style.display = 'none';
      } else {
        blob = file;
        const vurl = URL.createObjectURL(blob);
        previewVideo.src = vurl;
        previewVideo.style.display = 'block';
        previewImg.style.display = 'none';
      }
      currentPhotoBlob = blob;
      currentIsVideo = isVideo;
      preview.style.display = 'block';
      fileDrop.classList.add('has-file');
      fileLabel.textContent = file.name || (isVideo ? 'video.mp4' : 'photo.jpg');
      btnSave.disabled = false;
    } catch (err) {
      upErr.textContent = '处理失败:' + err.message + (isImage ? '(HEIC 格式请先导出为 JPEG)' : '');
      fileLabel.textContent = '点击选择,或拖拽文件到这里';
    }
  };

  fPhoto.addEventListener('change', (e) => handleFile(e.target.files[0]));

  // drag + drop
  ['dragenter', 'dragover'].forEach(ev => {
    fileDrop.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      fileDrop.classList.add('drag-active');
    });
  });
  ['dragleave', 'dragend'].forEach(ev => {
    fileDrop.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      fileDrop.classList.remove('drag-active');
    });
  });
  fileDrop.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    fileDrop.classList.remove('drag-active');
    const file = e.dataTransfer.files?.[0];
    if (file) handleFile(file);
  });

  // prevent the whole page from opening a dropped image
  ['dragover', 'drop'].forEach(ev => {
    window.addEventListener(ev, (e) => {
      if (!fileDrop.contains(e.target)) e.preventDefault();
    });
  });

  btnSave.addEventListener('click', async () => {
    if (!currentPhotoBlob) return;
    btnSave.disabled = true;
    btnSave.textContent = '上传中...';
    upErr.textContent = '';

    const form = new FormData();
    const filename = currentIsVideo ? (currentPhotoBlob.name || 'video.mp4') : 'photo.jpg';
    form.append('photo', currentPhotoBlob, filename);
    form.append('date', fDate.value || new Date().toISOString().slice(0, 10));
    form.append('age', fAge.value.trim());
    form.append('caption', fCaption.value.trim());

    try {
      const res = await fetch(`${API_URL}/upload`, {
        method: 'POST',
        headers: { 'x-password': getPwd() },
        body: form,
      });
      if (res.status === 401) {
        clearPwd(); updateAdminUI();
        upErr.textContent = '密码无效,请关闭后重新上传。';
        btnSave.disabled = false; btnSave.textContent = '保存';
        return;
      }
      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || '上传失败');
      }
      closeUploadModal();
      render();
    } catch (err) {
      upErr.textContent = err.message;
      btnSave.disabled = false;
      btnSave.textContent = '保存';
    }
  });

  // ---------- music ----------
  const music = document.getElementById('music');
  const musicBtn = document.getElementById('btn-music');
  music.volume = 0.45;
  musicBtn.addEventListener('click', async () => {
    if (music.paused) {
      try {
        await music.play();
        musicBtn.classList.add('playing');
        musicBtn.textContent = '❙❙';
        musicBtn.title = '暂停';
      } catch (err) { /* ignore */ }
    } else {
      music.pause();
      musicBtn.classList.remove('playing');
      musicBtn.textContent = '♪';
      musicBtn.title = '播放背景音乐';
    }
  });

  render();
</script>

</body>
</html>
